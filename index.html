<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login" class="card center">
  <h2>Enter</h2>

  <input id="name" placeholder="Name">
  <input id="country" placeholder="Select country..." readonly>

  <button onclick="join()">Enter</button>
</div>

<!-- COUNTRY -->
<div id="countryModal" class="modal hidden">
  <div class="modal-sheet">
    <input id="countrySearch" placeholder="Search country...">
    <div id="countryOptions"></div>
  </div>
</div>

<!-- MENU -->
<div id="menu" class="card center hidden">
  <h3 id="welcome"></h3>

  <button onclick="openPublic()">Public</button>
  <button onclick="openPrivate()">Private</button>
  <button onclick="openServer()">Servers</button>

  <div id="users" class="hidden"></div>
  <div id="servers" class="hidden"></div>
</div>

<!-- CHAT -->
<div id="chat" class="hidden">
  <div class="topbar">
    <button onclick="back()">←</button>
    <span id="chatTitle"></span>
  </div>

  <div id="messages"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script defer src="app.js"></script>

</body>
</html>
